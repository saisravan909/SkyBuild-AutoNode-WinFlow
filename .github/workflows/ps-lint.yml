name: PowerShell Linting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          # Install the analyzer module if not present
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          
          # Scan the root and scripts folder for issues
          $results = Invoke-ScriptAnalyzer -Path ./ -Recurse
          
          if ($results) {
              $results | Format-Table -AutoSize
              Write-Error "Linting issues found. Please review the output above."
          } else {
              Write-Host "No issues found! Scripts are clean." -ForegroundColor Green
          }
